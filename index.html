<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern DSL Experiment</title>
    <link rel="stylesheet" href="css/styles.css">
    <script>
        // Normalize condition string to handle case variations and whitespace
        function normalizeCondition(condition) {
            if (!condition) return null;
            const normalized = condition.trim().toLowerCase();
            if (normalized === 'puzzlefirst') return 'puzzleFirst';
            return condition.trim();
        }

        function normalizePrimitiveCondition(condition) {
            if (!condition) return null;
            const normalized = condition.trim().toUpperCase();
            if (normalized === 'A' || normalized === 'B') return normalized;
            return null;
        }

        function assignRandomPrimitiveConditionIfMissing() {
            const existing = normalizePrimitiveCondition(localStorage.getItem('primitiveCondition'));
            if (existing) return existing;
            const assigned = Math.random() < 0.5 ? 'A' : 'B';
            localStorage.setItem('primitiveCondition', assigned);
            console.log('Randomly assigned primitiveCondition:', assigned);
            return assigned;
        }
        
        // Check for URL parameter to set condition
        const urlParams = new URLSearchParams(window.location.search);
        let conditionParam = urlParams.get('condition');
        let primitiveConditionParam = urlParams.get('primitiveCondition');
        
        if (conditionParam) {
            conditionParam = normalizeCondition(conditionParam);
            if (conditionParam === 'puzzleFirst') {
                localStorage.setItem('experimentCondition', conditionParam);
                console.log('Condition set via URL:', conditionParam);
            }
        }

        // Optional URL override for primitive condition (A/B)
        if (primitiveConditionParam) {
            const normalizedPrimitive = normalizePrimitiveCondition(primitiveConditionParam);
            if (normalizedPrimitive) {
                localStorage.setItem('primitiveCondition', normalizedPrimitive);
                console.log('Primitive condition set via URL:', normalizedPrimitive);
            }
        } else {
            assignRandomPrimitiveConditionIfMissing();
        }
        
        // Redirect to consent page
        setTimeout(() => {
            window.location.href = 'routes/consent.html';
        }, 100);
    </script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .loading-container {
            text-align: center;
        }
        .loading-container h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            animation: fadeIn 1s ease-in;
        }
        .loading-container p {
            font-size: 1rem;
            opacity: 0.9;
            animation: fadeIn 1s ease-in 0.5s both;
        }
        .spinner {
            margin: 2rem auto;
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="loading-container">
        <h1>Pattern DSL Experiment</h1>
        <div class="spinner"></div>
        <p>Loading experiment...</p>
        <p style="font-size: 0.85rem; margin-top: 2rem;">
            If you are not redirected automatically, 
            <a href="routes/consent.html" style="color: white; text-decoration: underline;">click here</a>.
        </p>
    </div>
    <script src="js/devTestControls.js"></script>
</body>
</html>
